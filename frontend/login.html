<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Forecaster — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>

  <div class="auth-wrapper">

    <div class="auth-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">Weather<span class="brand-kv">KV</span></span>
      <span class="brand-tag">LRU CACHE</span>
    </div>

    <div class="auth-card">
      <div class="card-accent-line"></div>
      <div class="card-header">
        <div class="card-title">WELCOME BACK</div>
        <div class="card-sub">Sign in to access your dashboard</div>
      </div>

      <div class="auth-form">
        <div class="auth-msg error hidden" id="error-msg"></div>

        <div class="field-group">
          <label class="field-label">USERNAME</label>
          <div class="field-wrap">
            <span class="field-icon">◈</span>
            <input type="text" id="username" class="field-input" placeholder="e.g. admin" autocomplete="username"/>
          </div>
          <div class="field-err" id="username-err"></div>
        </div>

        <div class="field-group">
          <label class="field-label">PASSWORD</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="password" class="field-input" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="eye-btn" id="eye-btn" onclick="togglePw()">👁</button>
          </div>
          <div class="field-err" id="password-err"></div>
        </div>

        <button class="btn-primary" type="button" onclick="handleLogin()">
          <span>SIGN IN</span>
          <span class="btn-arrow">→</span>
        </button>

        <div class="demo-hint">
          <span class="hint-label">DEMO</span>
          <code>admin &nbsp;/&nbsp; admin1234</code>
        </div>
      </div>

      <div class="card-footer">
        New here? <a href="register.html" class="link-main">Create an account →</a>
      </div>
    </div>

  </div>

  <script>
    const USERS_KEY = 'mf_users', SESSION_KEY = 'mf_session';

    function getUsers() {
      const u = JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
      if (!u['admin']) { u['admin'] = { password: 'admin1234', role: 'ADMIN', avatar: 'A' }; localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
      return u;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg; el.classList.remove('hidden');
    }
    function clearError() {
      document.getElementById('error-msg').classList.add('hidden');
    }

    function togglePw() {
      const pw = document.getElementById('password');
      const btn = document.getElementById('eye-btn');
      if (pw.type === 'password') { pw.type = 'text'; btn.textContent = '🙈'; }
      else { pw.type = 'password'; btn.textContent = '👁'; }
    }

    function handleLogin() {
      clearError();
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      if (!username || !password) { showError('⚠ Please fill in all fields.'); return; }
      const user = getUsers()[username];
      if (!user || user.password !== password) { showError('⚠ Invalid username or password.'); return; }
      localStorage.setItem(SESSION_KEY, JSON.stringify({ username, role: user.role || 'USER', avatar: user.avatar || username[0].toUpperCase() }));
      window.location.href = 'index.html';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    if (localStorage.getItem(SESSION_KEY)) window.location.href = 'index.html';
    getUsers();
  </script>
</body>
</html>
